<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.K Bank Home</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* LOADER */
#loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

/* SPINNER */
.spinner {
    width: 70px;
    height: 70px;
    border: 6px solid rgba(255,255,255,0.2);
    border-top: 6px solid #00e5ff;
    border-right: 6px solid #0072ff;
    border-bottom: 6px solid #00ffcc;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

/* ROTATION */
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* LOADING TEXT */
#loader p {
    margin-top: 20px;
    font-size: 18px;
    color: #d6f4ff;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0.5; transform: scale(1); }
}

/* HEADER */
.header{
width:100%;
padding:15px 30px;
display:flex;
align-items:center;
justify-content:space-between;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
box-shadow:0 5px 15px rgba(0,0,0,0.4);
}

/* LOGO */
.logo{
font-size:28px;
font-weight:bold;
color:#00e5ff;
}

/* BUTTONS */
.nav-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.nav-buttons button{
border:none;
padding:10px 14px;
border-radius:8px;
font-size:14px;
font-weight:bold;
cursor:pointer;
color:white;
background:linear-gradient(135deg,#00c6ff,#0072ff);
transition:0.3s;
box-shadow:0 4px 15px rgba(0,114,255,0.3);
}

/* Hover */
.nav-buttons button:hover{
transform:translateY(-3px);
box-shadow:0 6px 20px rgba(0,114,255,0.5);
}

/* Click */
.nav-buttons button:active {
transform: scale(0.9);
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
    <div class="spinner"></div>
    <p>Loading... Please wait</p>
</div>

<!-- SOUND -->
<audio id="clickSound" src="sound/sun.mp3" preload="auto"></audio>

<div class="header">

<div class="logo">S.K Bank</div>

<div class="nav-buttons">

<button onclick="handleClick('registration atm.html')">Apply ATM Card</button>

<button onclick="handleClick('login.html')">Login ATM system</button>

<button onclick="handleClick('ATM system/atm card download.html')">ATM card download</button>

<button onclick="handleClick('ATM system/panel.html')">ATM panel</button>

</div>

</div>

<script>

/* CLICK FUNCTION */
function handleClick(url) {

    // play sound
    const sound = document.getElementById("clickSound");
    sound.currentTime = 0;
    sound.play().catch(()=>{});

    // show loader
    document.getElementById("loader").style.display = "flex";

    // redirect after 2 seconds
    setTimeout(() => {
        window.location.href = url;
    }, 1500); // ✅ 2 SECONDS
}

</script>

</body>
</html>
