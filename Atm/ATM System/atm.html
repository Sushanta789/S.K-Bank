<!DOCTYPE html>
<html>
<head>
<title>VIP ATM Card</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  font-family:Arial;
}

/* CARD CONTAINER */
.card-container{
  perspective:1000px;
}

/* CARD */
.card{
  width:340px;
  height:210px;
  position:relative;
  transform-style:preserve-3d;
  transition:0.8s;
  cursor:pointer;
}

/* FLIP */
.card-container:hover .card{
  transform:rotateY(180deg) scale(1.05);
}

/* SIDE */
.side{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  padding:20px;
  backface-visibility:hidden;
  color:#ffd700;
  background:linear-gradient(135deg,#000,#2c2c2c);
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
  overflow:hidden;
}

/* GOLD EFFECT */
.side::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,215,0,0.3), transparent 40%);
  top:-50%;
  left:-50%;
}

/* FRONT */
.front{}

.chip{
  width:55px;
  height:35px;
  background:gold;
  border-radius:6px;
  margin-bottom:25px;
}

.number{
  font-size:20px;
  letter-spacing:3px;
  margin-bottom:15px;
}

.cvv{
  font-size:14px;
}

.logo{
  position:absolute;
  bottom:15px;
  right:20px;
  font-size:18px;
  font-weight:bold;
}

/* BACK */
.back{
  transform:rotateY(180deg);
}

.strip{
  height:40px;
  background:#000;
  margin-bottom:20px;
}

.cvv-box{
  background:#fff;
  color:#000;
  padding:5px;
  width:80px;
  text-align:center;
  margin-bottom:15px;
}

.text{
  font-size:14px;
  margin-top:8px;
}

.title{
  font-weight:bold;
  margin-bottom:10px;
}

</style>

</head>

<body>

<div class="card-container">
  <div class="card">

    <!-- FRONT -->
    <div class="side front">
      <div class="chip"></div>
      <div class="number" id="cardNumber"></div>
      <div class="cvv">CVV: <span id="cvvFront"></span></div>
      <div class="logo">VISA</div>
    </div>

    <!-- BACK -->
    <div class="side back">
      <div class="strip"></div>
      <div class="cvv-box" id="cvvBack"></div>

      <div class="title">💳 VIP CARD</div>
      <div class="text">Name: <span id="name"></span></div>
      <div class="text">Bank: S.K BANK</div>
      <div class="text">EXP: <span id="exp"></span></div>
    </div>

  </div>
</div>

<script>

/* LOAD USER */
let user = JSON.parse(localStorage.getItem("currentUser"));

if(!user){
  alert("Login first");
  window.location.href="login.html";
}

/* CHECK APPROVAL */
if(user.vipPending){
  alert("⏳ Card pending approval");
  window.location.href="login.html";
}

if(!user.vipCard){
  alert("❌ No ATM card");
  window.location.href="login.html";
}

/* SHOW DATA */
document.getElementById("cardNumber").innerText = user.cardNumber;
document.getElementById("cvvFront").innerText = user.cvv;
document.getElementById("cvvBack").innerText = user.cvv;
document.getElementById("name").innerText = user.fullName;
document.getElementById("exp").innerText = user.expiry;

</script>

</body>
</html>
