<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>S.K Bank Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 470px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
      color: #fff;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 30px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #d8f3ff;
      margin-bottom: 22px;
    }

    .form-group {
      margin-bottom: 16px;
      animation: fadeIn 0.7s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: bold;
      color: #eefaff;
    }

    input {
      width: 100%;
      padding: 13px;
      border: none;
      outline: none;
      border-radius: 12px;
      font-size: 15px;
      background: rgba(255,255,255,0.93);
      color: #222;
      transition: 0.3s ease;
    }

    input:focus {
      transform: scale(1.01);
      box-shadow: 0 0 0 3px rgba(0,198,255,0.25);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0,114,255,0.35);
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      display: none;
      font-size: 14px;
      animation: popIn 0.4s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .success {
      background: rgba(0, 200, 83, 0.18);
      color: #b9ffd0;
      border: 1px solid rgba(0, 200, 83, 0.35);
      display: block;
    }

    .error {
      background: rgba(255, 82, 82, 0.16);
      color: #ffd1d1;
      border: 1px solid rgba(255, 82, 82, 0.35);
      display: block;
    }

    .details-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.10);
      display: none;
      animation: zoomIn 0.5s ease;
    }

    @keyframes zoomIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .details-box p {
      margin: 8px 0;
      font-size: 15px;
      color: #eef7ff;
      word-break: break-word;
    }

    .balance {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(90deg, rgba(0,198,255,0.18), rgba(0,114,255,0.25));
      animation: glowPulse 0.8s ease;
    }

    @keyframes glowPulse {
      0% { transform: scale(0.96); opacity: 0.8; }
      50% { transform: scale(1.03); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>S.K Bank</h1>
    <p class="subtitle">Login Page</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="accountNumber">S.K Bank Account Number</label>
        <input type="text" id="accountNumber" placeholder="Enter account number" required />
      </div>

      <div class="form-group">
        <label for="mobileNumber">Mobile Number</label>
        <input type="text" id="mobileNumber" placeholder="Enter mobile number" maxlength="10" required />
      </div>

      <button type="submit" class="btn">Submit Login</button>
    </form>

    <div id="messageBox" class="message"></div>

    <div id="detailsBox" class="details-box">
      <p><strong>Bank Name:</strong> S.K Bank</p>
      <p><strong>Full Name:</strong> <span id="showName"></span></p>
      <p><strong>Account Number:</strong> <span id="showAccount"></span></p>
      <p><strong>Customer Number:</strong> <span id="showCustomer"></span></p>
      <p><strong>ATM Card Number:</strong> <span id="showATMCard">Not issued</span></p>
      <div class="balance">
        Bank Balance: ₹<span id="showBalance"></span>
      </div>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const messageBox = document.getElementById("messageBox");
    const detailsBox = document.getElementById("detailsBox");

    function getUsers() {
      return JSON.parse(localStorage.getItem("sk_bank_users")) || [];
    }

    function getCards() {
      return JSON.parse(localStorage.getItem("sk_bank_atm_cards")) || [];
    }

    function showMessage(text, type) {
      messageBox.style.display = "block";
      messageBox.className = "message " + type;
      messageBox.textContent = text;
    }

    loginForm.addEventListener("submit", function(e) {
      e.preventDefault();

      const accountNumber = document.getElementById("accountNumber").value.trim();
      const mobileNumber = document.getElementById("mobileNumber").value.trim();

      if (!/^[0-9]{10}$/.test(mobileNumber)) {
        showMessage("Please enter valid 10 digit mobile number.", "error");
        detailsBox.style.display = "none";
        return;
      }

      const users = getUsers();

      const foundUser = users.find(user =>
        user.accountNumber === accountNumber &&
        (user.mobile === mobileNumber || user.mobileNumber === mobileNumber)
      );

      if (!foundUser) {
        showMessage("Invalid account number or mobile number.", "error");
        detailsBox.style.display = "none";
        return;
      }

      showMessage("Login successful.", "success");

      document.getElementById("showName").textContent = foundUser.fullName || "";
      document.getElementById("showAccount").textContent = foundUser.accountNumber || "";
      document.getElementById("showCustomer").textContent = foundUser.customerNumber || "";
      document.getElementById("showBalance").textContent = Number(foundUser.balance || 0).toFixed(2);

      const cards = getCards();

      const userCard = cards.find(card =>
        card.accountNumber === foundUser.accountNumber &&
        card.status === "APPROVED"
      );

      if (userCard) {
        document.getElementById("showATMCard").textContent = userCard.cardNumber || "Not issued / Pending";
      } else {
        document.getElementById("showATMCard").textContent = "Not issued / Pending";
      }

      detailsBox.style.display = "block";
      loginForm.reset();
    });
  </script>

</body>
</html>
