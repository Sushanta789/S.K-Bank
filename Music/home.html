<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3 Button Animation Page</title>

<style>
/* Background Animation */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #6a11cb, #2575fc, #ff6a00, #ee0979);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
  font-family: Arial, sans-serif;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Container */
.container {
  display: flex;
  gap: 20px;
}

/* Base button */
button {
  padding: 15px 30px;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  border-radius: 30px;
  position: relative;
  overflow: hidden;
}

/* Button 1 - Ripple */
.btn1 { background: #ff416c; }

.btn1::after {
  content: "";
  position: absolute;
  width: 300%;
  height: 300%;
  top: 50%;
  left: 50%;
  background: rgba(255,255,255,0.2);
  transform: translate(-50%, -50%) scale(0);
  border-radius: 50%;
  transition: 0.5s;
}
.btn1:hover::after {
  transform: translate(-50%, -50%) scale(1);
}

/* Button 2 - Shine */
.btn2 { background: #11998e; }

.btn2::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
  transition: 0.5s;
}
.btn2:hover::before {
  left: 100%;
}

/* Button 3 - Glow */
.btn3 {
  background: #ffcc00;
  box-shadow: 0 0 10px #ffcc00;
}
.btn3:hover {
  box-shadow: 0 0 20px #fff, 0 0 40px #ffcc00;
}

</style>
</head>

<body>

<div class="container">
  <button class="btn1" onclick="goPage('update/mp3.html')">Music upload system</button>
  <button class="btn2" onclick="goPage('music.html')">Only Music play</button>
  <button class="btn3" onclick="goPage('mp3play.html')">DJ system</button>
</div>

<script>
function goPage(url) {
  window.location.href = url;
}

/* Optional: Auto open page after 5 seconds */
setTimeout(() => {
  console.log("Auto redirect ready (disabled)");
  // Uncomment below if needed:
  // window.location.href = "page1.html";
}, 5000);
</script>

</body>
</html>
